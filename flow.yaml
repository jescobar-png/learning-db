steps:
  - id: plan
    model: claude-sonnet-4-6
    prompt: |
      Break the project into a step-by-step execution plan optimized for a smaller model.

      Requirements:
      - Each step must be atomic and executable independently
      - Each step must produce a clear output artifact
      - Follow a teaching progression (tutorial-style)

      Return ONLY JSON:

      {
        "goal": "string",
        "teaching_flow": ["string"],
        "steps": [
          { "id": 1, "description": "..." }
        ],
        "files": ["string"],
        "interfaces": [
          {
            "name": "string",
            "methods": ["string"]
          }
        ],
        "constraints": ["string"],
        "edge_cases": ["string"]
      }
    output: plan

  - id: execute
    steps:
      - id: init_results
        set:
          results: []

      - id: run_steps
        foreach: plan.steps
        as: step
        steps:
          - id: run_step
            model: claude-haiku-4-5
            prompt: |
              Do ONLY this task. Be minimal and precise.

              Task:
              {{step.description}}

              Constraints:
              {{plan.constraints}}

              Return only the result artifact.
            output: step_result

          - id: save_result
            set:
              results[]: "{{step_result}}"

output:
  goal: plan.goal
  teaching_flow: plan.teaching_flow
  results: results
  files: plan.files
  interfaces: plan.interfaces
  constraints: plan.constraints
  edge_cases: plan.edge_cases
